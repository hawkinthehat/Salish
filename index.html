<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Salish Echo: Medicine for the Spirit</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/framer-motion@10.12.16/dist/framer-motion.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; overflow: hidden; }
        .font-cinzel { font-family: 'Cinzel', serif; }
        .salish-red { color: #991b1b; }
        .salish-teal { color: #2dd4bf; }
        .glow-teal { text-shadow: 0 0 20px rgba(45, 212, 191, 0.5); }
        .bg-cedar { background-color: #1a1614; }
        input::placeholder { color: #1e293b; }
        .line-draw { stroke-dasharray: 1000; stroke-dashoffset: 1000; animation: dash 5s linear forwards; }
        @keyframes dash { to { stroke-dashoffset: 0; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { motion, AnimatePresence } = FramerMotion;

        // --- AUDIO ENGINE ---
        const playSound = (freq, type = 'sine', vol = 0.05, duration = 0.2) => {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const g = ctx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, ctx.currentTime);
                g.gain.setValueAtTime(vol, ctx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration);
                osc.connect(g); g.connect(ctx.destination);
                osc.start(); osc.stop(ctx.currentTime + duration);
            } catch(e) {}
        };

        // --- STORY INTRO OVERLAY ---
        const StoryIntro = ({ onStart }) => (
            <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }}
                className="fixed inset-0 z-[100] bg-slate-950 flex flex-col items-center justify-center p-8 text-center"
            >
                <div className="max-w-lg border-l-2 border-red-900 pl-8 py-4">
                    <h1 className="font-cinzel text-3xl text-red-700 mb-6 tracking-[0.3em] uppercase">The Great Silence</h1>
                    <p className="text-slate-400 leading-relaxed mb-8 text-sm italic">
                        "The fog has swallowed the songs of our people. As a Resonator, you must find the rhythm of the shadow thoughts to shatter them and clear the path home."
                    </p>
                    <div className="bg-teal-950/10 border border-teal-500/20 p-6 rounded-2xl text-left mb-8">
                        <h3 className="text-teal-500 font-bold text-[10px] mb-3 uppercase tracking-widest">Protocol:</h3>
                        <ul className="text-xs text-slate-400 space-y-3">
                            <li className="flex gap-2"><span>•</span> <span>Match the <strong>Beats</strong> (syllables) of the shadow text.</span></li>
                            <li className="flex gap-2"><span>•</span> <span>Type a <strong>New Truth</strong> to harmonize the frequency.</span></li>
                            <li className="flex gap-2"><span>•</span> <span>Press <strong>Enter</strong> to shatter the fog.</span></li>
                        </ul>
                    </div>
                    <button onClick={onStart} className="w-full py-4 bg-red-900 hover:bg-red-800 text-white font-bold rounded-xl transition-all uppercase tracking-[0.4em] text-[10px]">
                        Begin the Journey
                    </button>
                </div>
            </motion.div>
        );

        function App() {
            const [gameState, setGameState] = useState('INTRO');
            const [input, setInput] = useState("");
            const [level, setLevel] = useState(0);
            const [isShattering, setIsShattering] = useState(false);
            const [mousePos, setMousePos] = useState({ x: 0, y: 0 });
            const [hintActive, setHintActive] = useState(false);

            const levels = [
                { shadow: "I am all a-lone", beats: 5, teaching: "Connection", hint: "Try: 'I am part of all'" },
                { shadow: "The waves are too big", beats: 5, teaching: "Resilience", hint: "Try: 'My ca-noe is strong'" },
                { shadow: "I am stuck in place", beats: 5, teaching: "Movement", hint: "Try: 'I move with the tide'" },
                { shadow: "No one hears my voice", beats: 5, teaching: "Truth", hint: "Try: 'My voice is a song'" }
            ];

            const current = levels[level % levels.length];

            const countSyllables = (str) => {
                const words = str.toLowerCase().split(' ').filter(w => w.length > 0);
                let count = 0;
                words.forEach(w => {
                    if (w.length <= 3) count++;
                    else {
                        const s = w.replace(/(?:[^laeiouy]es|ed|[^laeiouy]e)$/, '').match(/[aeiouy]{1,2}/g);
                        count += s ? s.length : 1;
                    }
                });
                return count;
            };

            const userBeats = countSyllables(input);
            const isMatch = userBeats === current.beats && input.trim().split(" ").length >= 2;

            useEffect(() => {
                const move = (e) => setMousePos({ x: e.clientX, y: e.clientY });
                window.addEventListener('mousemove', move);
                // Hint timer: if no input for 10 seconds, show hint
                const timer = setTimeout(() => { if(input === "") setHintActive(true); }, 10000);
                return () => { window.removeEventListener('mousemove', move); clearTimeout(timer); };
            }, [input, level]);

            const handleResonate = () => {
                if (isMatch) {
                    setIsShattering(true);
                    setHintActive(false);
                    playSound(440, 'triangle', 0.1, 0.6);
                    setTimeout(() => {
                        setIsShattering(false);
                        setLevel(l => l + 1);
                        setInput("");
                    }, 1000);
                }
            };

            return (
                <div className="h-screen w-full bg-slate-950 flex flex-col items-center justify-center relative overflow-hidden">
                    <AnimatePresence>
                        {gameState === 'INTRO' && <StoryIntro onStart={() => setGameState('PLAYING')} />}
                    </AnimatePresence>

                    {/* SPIRIT GUIDE (SPARK) */}
                    <motion.div className="fixed pointer-events-none z-40 rounded-full bg-teal-400"
                        animate={{ x: mousePos.x + 20, y: mousePos.y + 20 }}
                        transition={{ type: "spring", stiffness: 80, damping: 20 }}
                        style={{ width: '12px', height: '12px', boxShadow: '0 0 20px #2dd4bf' }}
                    />

                    <div className="z-10 text-center w-full max-w-2xl px-6">
                        <motion.div animate={{ opacity: [0.3, 0.6, 0.3] }} transition={{ repeat: Infinity, duration: 3 }}
                            className="mb-4 text-red-800 font-cinzel tracking-[0.5em] text-[10px] uppercase">
                            Direction: {['East', 'South', 'West', 'North'][level % 4]} • {current.teaching}
                        </motion.div>
                        
                        <AnimatePresence mode="wait">
                            <motion.h2 key={level} initial={{ opacity: 0, y: 10 }} animate={{ opacity: 1, y: 0 }} exit={{ opacity: 0 }}
                                className={`text-4xl md:text-5xl font-cinzel mb-20 transition-all duration-700 ${isMatch ? 'text-teal-400 glow-teal' : 'text-slate-700 italic'}`}>
                                "{isMatch ? input : current.shadow}"
                            </motion.h2>
                        </AnimatePresence>

                        <div className="relative max-w-md mx-auto">
                            <input autoFocus value={input} 
                                onChange={(e) => { setInput(e.target.value); playSound(200 + (userBeats * 30), 'sine', 0.03); }}
                                onKeyDown={(e) => e.key === 'Enter' && handleResonate()}
                                className={`w-full bg-transparent border-b-2 py-4 text-2xl text-center outline-none transition-all duration-500 
                                    ${isMatch ? 'border-teal-500 text-teal-300' : 'border-slate-900 text-white'}`}
                                placeholder="Speak into the fog..."
                            />
                            
                            {/* BEAT VISUALIZER */}
                            <div className="mt-8 flex justify-center gap-3">
                                {[...Array(current.beats)].map((_, i) => (
                                    <div key={i} className={`h-1 w-6 rounded-full transition-all duration-300 ${i < userBeats ? 'bg-teal-500 shadow-[0_0_8px_#2dd4bf]' : 'bg-slate-900'}`} />
                                ))}
                            </div>
                            
                            {/* HINT SYSTEM */}
                            <AnimatePresence>
                                {hintActive && !isMatch && (
                                    <motion.p initial={{ opacity: 0 }} animate={{ opacity: 1 }} className="mt-6 text-[10px] text-teal-600/50 italic tracking-widest uppercase">
                                        Hint: {current.hint}
                                    </motion.p>
                                )}
                            </AnimatePresence>
                        </div>

                        {isMatch && (
                            <motion.button initial={{ scale: 0.9, opacity: 0 }} animate={{ scale: 1, opacity: 1 }}
                                onClick={handleResonate}
                                className="mt-16 px-12 py-4 bg-teal-600/20 border border-teal-500/50 text-teal-400 rounded-full font-bold text-[10px] uppercase tracking-[0.3em] hover:bg-teal-500 hover:text-white transition-all"
                            >
                                Shatter Echo
                            </motion.button>
                        )}
                    </div>

                    {/* HUD: LONGHOUSE PROGRESS */}
                    <div className="absolute bottom-10 w-full px-12 flex justify-between items-end border-t border-white/5 pt-8 text-slate-800 font-bold text-[9px] uppercase tracking-[0.2em]">
                        <div className="flex flex-col gap-2">
                            <span>Cedar Weaving Progress</span>
                            <div className="w-32 h-1 bg-slate-900 rounded-full overflow-hidden">
                                <motion.div animate={{ width: `${(level/4)*100}%` }} className="h-full bg-red-900" />
                            </div>
                        </div>
                        <div className="text-right">
                            <span>Resonance: Level {level + 1}</span><br/>
                            <span className="text-teal-900">Spirit Guide: Mote</span>
                        </div>
                    </div>

                    {/* PARTICLE LAYER (SHATTER) */}
                    {isShattering && (
                        <div className="absolute inset-0 z-50 pointer-events-none">
                            {[...Array(15)].map((_, i) => (
                                <motion.div key={i} initial={{ x: "50%", y: "50%", opacity: 1 }}
                                    animate={{ x: `${Math.random()*100}%`, y: `${Math.random()*100}%`, opacity: 0 }}
                                    transition={{ duration: 0.8 }}
                                    className="absolute w-2 h-2 bg-red-700 rotate-45"
                                />
                            ))}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
